# ======================== DevTools ========================
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
spring.devtools.restart.trigger-file=reload.trigger

# ======================== Tesseract OCR ========================
tesseract.data-path=D:/ruanjian/tesseract/tessdata

# ======================== DeepSeek AI ========================
deepseek.api-key=YOUR_DEEPSEEK_API_KEY
deepseek.base-url=https://api.deepseek.com
deepseek.model-name=deepseek-chat
deepseek.max-tokens=8192
deepseek.timeout-seconds=800

# ======================== Ollama Embedding ========================
ollama.base-url=http://127.0.0.1:11434
ollama.embedding-model.name=nomic-embed-text

# ======================== Ollama Chat (fallback) ========================
ollama.chat-model.enabled=true
ollama.chat-model.name=qwen2.5:7b
ollama.chat-model.timeout-seconds=600
ollama.chat-model.temperature=0.7
ollama.chat-model.max-tokens=8192

llm.fallback.enabled=true
llm.fallback.health-check-interval-seconds=60

# ======================== Project Build ========================
project.build.project-path=E:\\gjgw\\monitoring_center_alarm
project.build.maven-cmd=mvn

# ======================== Elasticsearch Vector Store ========================
vector.store.type=elasticsearch
elasticsearch.url=http://127.0.0.1:9200
elasticsearch.index-name=dev-ai-vectors
elasticsearch.username=
elasticsearch.password=
elasticsearch.connect-timeout-seconds=30
elasticsearch.socket-timeout-seconds=60

# ======================== Script Executor ========================
script.base-dir=./scripts
script.timeout-seconds=30

# ======================== Web Search ========================
# Search engine: duckduckgo or bing (bing is accessible in China)
web.search.engine=bing

# HTTP proxy for web search (optional, for accessing blocked sites)
web.search.proxy.enabled=false
web.search.proxy.host=
web.search.proxy.port=1080

# ======================== MySQL Database ========================
spring.datasource.url=jdbc:mysql://127.0.0.1:3308/dev_ai_platform?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ======================== JPA / Hibernate ========================
# ddl-auto: update = auto create/update tables without data loss
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# dialect auto-detect by Hibernate from JDBC metadata (compatible with MySQL 5.7)
